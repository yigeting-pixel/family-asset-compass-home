services:
  advisor-workbench:
    build: .
    ports:
      - "8501:8501"
    volumes:
      - ./workspace:/app/workspace
      - ./snapshots:/app/snapshots
    command: streamlit run app.py --server.address=0.0.0.0 --server.port=8501

  advisor-api:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./workspace:/app/workspace
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000
